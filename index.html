<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>人教版小学汉字听写通</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f4f0;min-height:100vh;-webkit-text-size-adjust:100%}
:root{--a:#534AB7;--al:#EEEDFE;--s:#1D9E75;--d:#E24B4A;--w:#BA7517;--bg:#ffffff;--bg2:#f5f4f0;--bd:#e5e4e0;--t:#1a1a1a;--t2:#666;--t3:#999}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bd:#3a3a3c;--t:#f5f5f7;--t2:#aeaeb2}}
@keyframes pop{0%{transform:scale(.2);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.pop{animation:pop .4s ease both}.shk{animation:shk .4s ease both}
body{color:var(--t)}
#app{max-width:640px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,20px)}
.hdr{background:var(--bg);border-bottom:0.5px solid var(--bd);padding:1rem 1rem .75rem;position:sticky;top:0;z-index:10}
.hdr h1{font-size:20px;font-weight:500;color:var(--t)}
.hdr p{font-size:11px;color:var(--t2);margin-top:3px;letter-spacing:1px}
.wrap{padding:.75rem}
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:12px;padding:1rem;margin-bottom:.75rem}
/* 首页 */
.grade-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.75rem}
.tab{padding:6px 14px;border-radius:20px;border:0.5px solid var(--bd);background:var(--bg);color:var(--t2);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;min-height:36px}
.tab.sel{background:var(--a);color:#fff;border-color:var(--a)}
.vol-tabs{display:flex;gap:6px;margin-bottom:.75rem}
.vtab{flex:1;padding:8px;border-radius:8px;border:0.5px solid var(--bd);background:var(--bg);color:var(--t2);font-size:14px;cursor:pointer;font-family:inherit;text-align:center}
.vtab.sel{background:var(--al);color:var(--a);border-color:var(--a)}
.unit-list{display:flex;flex-direction:column;gap:6px;margin-bottom:.75rem}
.unit-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:0.5px solid var(--bd);background:var(--bg)}
.unit-row.sel{border-color:var(--a);background:var(--al)}
.unit-info{flex:1}
.unit-name{font-size:14px;font-weight:500;color:var(--t)}
.unit-meta{font-size:11px;color:var(--t2);margin-top:2px}
.bar-w{width:60px;height:5px;background:var(--bd);border-radius:3px;overflow:hidden;flex-shrink:0}
.bar-f{height:100%;border-radius:3px}
.pct-t{font-size:11px;color:var(--t2);flex-shrink:0;min-width:28px;text-align:right}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:.75rem}
.stat{background:var(--bg2);border-radius:8px;padding:.5rem;text-align:center}
.stat-n{font-size:18px;font-weight:500}
.stat-l{font-size:10px;color:var(--t2);margin-top:2px}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
.btn:active{opacity:.75}
.btn-p{background:var(--a);color:#fff}
.btn-d{background:transparent;color:var(--d);border:0.5px solid var(--d)!important;margin-top:8px}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px;border:0.5px solid var(--bd);background:var(--bg2);color:var(--t);cursor:pointer;font-family:inherit;min-height:36px}
.btn-sm:active{opacity:.7}
/* 练习页 */
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.nav-back{padding:8px 12px;border-radius:8px;border:0.5px solid var(--bd);background:var(--bg2);color:var(--t);font-size:13px;cursor:pointer;font-family:inherit;min-height:40px}
.prog-bar{height:4px;background:var(--bd);border-radius:2px;margin-bottom:.75rem;overflow:hidden}
.prog-f{height:100%;border-radius:2px;background:var(--a)}
.pinyin{font-size:26px;letter-spacing:4px;color:var(--a);font-weight:500;margin-bottom:10px}
.speak-btn{display:inline-block;padding:9px 18px;background:var(--a);color:#fff;border:none;border-radius:50px;font-size:13px;cursor:pointer;font-family:inherit;min-height:40px}
.speak-btn:active{opacity:.75}
canvas{display:block;margin:0 auto;border-radius:8px;border:0.5px solid var(--bd);touch-action:none}
.cv-bar{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:6px}
.compare-row{display:flex;gap:10px;margin-bottom:1rem}
.cbox{flex:1;background:var(--bg);border:0.5px solid var(--bd);border-radius:12px;padding:.75rem;text-align:center}
.judge-row{display:flex;gap:10px;margin-bottom:8px}
.jbtn{flex:1;border-radius:12px;text-align:center;cursor:pointer;padding:14px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:78px}
.jbtn:active{opacity:.8;transform:scale(.97)}
.rc{display:inline-flex;align-items:center;justify-content:center;width:88px;height:88px;border-radius:50%;margin-bottom:10px}
.save-tip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;background:#E1F5EE;color:#085041;margin-bottom:.5rem}
</style>
</head>
<body>

/* ══ 展平 ══ */
function flatten(gIdx,vIdx,uIdx){
  const r=[];
  const gs=gIdx===null?GRADES:[GRADES[gIdx]];
  gs.forEach((g,gi)=>{
    const vs=vIdx===null?g.vols:[g.vols[vIdx]];
    vs.forEach((v,vi)=>{
      const us=uIdx===null?v.units:[v.units[uIdx]];
      us.forEach(u=>u.chars.forEach(c=>r.push({...c,grade:g.g,vol:v.v,unit:u.u})));
    });
  });
  return r;
}

function cd(c){if(!S.srs[c])S.srs[c]={stab:null,reps:0};return S.srs[c];}
function gr(c,r){const d=cd(c),ns=Math.max(.5,(d.stab||[null,.4,.6,2.4,5.8][r]||1)*[null,.2,.7,1.3,2.0][r]);d.stab=ns;d.reps++;save();}

/* ══ 音效 ══ */
let AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function beep(ok){try{const ctx=ac(),t=ctx.currentTime;if(ok){[[523,t],[659,t+.1],[784,t+.2],[1047,t+.3]].forEach(([f,w])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.001,w);g.gain.linearRampToValueAtTime(.2,w+.03);g.gain.exponentialRampToValueAtTime(.001,w+.35);o.connect(g);g.connect(ctx.destination);o.start(w);o.stop(w+.4);});}else{[[220,t],[196,t+.2]].forEach(([f,w])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.value=f;g.gain.setValueAtTime(.001,w);g.gain.linearRampToValueAtTime(.18,w+.03);g.gain.exponentialRampToValueAtTime(.001,w+.3);o.connect(g);g.connect(ctx.destination);o.start(w);o.stop(w+.35);});}}catch(e){}}

/* ══ TTS ══ */
function speak(c){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const ws=c.w&&c.w.length?c.w.join("，"):c.m;const txt=c.c+"。"+ws;const u=new SpeechSynthesisUtterance(txt);u.lang="zh-CN";u.rate=.82;const v=window.speechSynthesis.getVoices().filter(x=>x.lang.startsWith("zh"));if(v.length)u.voice=v[0];window.speechSynthesis.speak(u);}

/* ══ DOM ══ */
function mk(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e;}

/* ══ Canvas ══ */
let cvCtx=null,strokeN=0,gFn=null;
function cvSize(){return Math.min(window.innerWidth-48,300);}
function makeCanvas(){
  const sz=cvSize(),wrap=div("");wrap.style.position="relative";
  const cv=document.createElement("canvas");cv.id="hw-canvas";cv.width=sz;cv.height=sz;
  cv.style.cssText="display:block;margin:0 auto;border-radius:8px;border:0.5px solid var(--bd);touch-action:none;";
  cvCtx=cv.getContext("2d");strokeN=0;S.hasStrokes=false;
  function dg(){cvCtx.clearRect(0,0,sz,sz);cvCtx.setLineDash([3,3]);cvCtx.strokeStyle="rgba(83,74,183,0.15)";cvCtx.lineWidth=1;[sz/2].forEach(v=>{cvCtx.beginPath();cvCtx.moveTo(v,0);cvCtx.lineTo(v,sz);cvCtx.stroke();cvCtx.beginPath();cvCtx.moveTo(0,v);cvCtx.lineTo(sz,v);cvCtx.stroke();});cvCtx.setLineDash([2,5]);cvCtx.strokeStyle="rgba(83,74,183,0.07)";[sz/4,sz*3/4].forEach(v=>{cvCtx.beginPath();cvCtx.moveTo(v,0);cvCtx.lineTo(v,sz);cvCtx.stroke();cvCtx.beginPath();cvCtx.moveTo(0,v);cvCtx.lineTo(sz,v);cvCtx.stroke();});cvCtx.setLineDash([]);}
  gFn=dg;dg();
  const cnt=div("");cnt.style.cssText="font-size:12px;color:var(--t2)";cnt.textContent="0 笔";
  let painting=false,lx=0,ly=0;
  function pt(e){const r=cv.getBoundingClientRect(),s=e.touches?e.touches[0]:e,ratio=sz/r.width;return[(s.clientX-r.left)*ratio,(s.clientY-r.top)*ratio];}
  function dn(e){e.preventDefault();painting=true;[lx,ly]=pt(e);cvCtx.beginPath();cvCtx.moveTo(lx,ly);cvCtx.strokeStyle="#111";cvCtx.lineWidth=Math.max(3,sz/80);cvCtx.lineCap="round";cvCtx.lineJoin="round";}
  function mv(e){e.preventDefault();if(!painting)return;const[x,y]=pt(e);cvCtx.beginPath();cvCtx.moveTo(lx,ly);cvCtx.lineTo(x,y);cvCtx.stroke();[lx,ly]=[x,y];}
  function up(e){e.preventDefault();if(!painting)return;painting=false;strokeN++;S.hasStrokes=true;cnt.textContent=strokeN+" 笔";}
  ["mousedown","touchstart"].forEach(ev=>cv.addEventListener(ev,dn,{passive:false}));
  ["mousemove","touchmove"].forEach(ev=>cv.addEventListener(ev,mv,{passive:false}));
  ["mouseup","mouseleave","touchend","touchcancel"].forEach(ev=>cv.addEventListener(ev,up,{passive:false}));
  wrap.appendChild(cv);
  const bar=div("cv-bar");
  const clrBtn=mk("button","btn-sm","清除");clrBtn.onclick=()=>{if(gFn)gFn();strokeN=0;S.hasStrokes=false;cnt.textContent="0 笔";};
  const refBtn=mk("button","btn-sm","显示参考");refBtn.onclick=()=>{const g=document.getElementById("g-ref");if(g){g.remove();refBtn.textContent="显示参考";}else{const gh=div("");gh.id="g-ref";Object.assign(gh.style,{position:"absolute",top:"0",left:"50%",transform:"translateX(-50%)",fontSize:(sz*.82)+"px",lineHeight:sz+"px",opacity:"0.07",pointerEvents:"none",color:"var(--a)",zIndex:"0",width:sz+"px",textAlign:"center"});gh.textContent=S.list[S.idx].c;wrap.insertBefore(gh,cv);cv.style.position="relative";cv.style.zIndex="1";refBtn.textContent="隐藏参考";}};
  bar.appendChild(clrBtn);bar.appendChild(cnt);bar.appendChild(refBtn);wrap.appendChild(bar);
  return wrap;
}

function snap(){const cv=document.getElementById("hw-canvas");if(!cv)return null;try{const o=document.createElement("canvas");o.width=80;o.height=80;const oc=o.getContext("2d");oc.fillStyle="#fff";oc.fillRect(0,0,80,80);oc.drawImage(cv,0,0,80,80);return o.toDataURL("image/jpeg",.4);}catch(e){return null;}}

function doGrade(r){
  const c=S.list[S.idx];gr(c.c,r);
  if(r>=3){S.session.ok++;beep(true);}else{S.session.fail++;beep(false);if(!S.wrongList.find(w=>w.c===c.c)){S.wrongList.push({...c});save();}}
  S.grade=r;S.phase="result";render();
}

/* ══ 首页 ══ */
function Home(){
  const wrap=div("wrap");

  if(learned>0||S.wrongList.length>0){const tip=div("save-tip","✓ 进度已保存，刷新不丢失");wrap.appendChild(tip);}

  /* 统计 */
  const sr=div("stat-row");
  [[String(totalAll),"总字数","var(--a)"],[String(learned),"已练","var(--s)"],[String(S.wrongList.length),"生词库","var(--d)"]].forEach(([n,l,col])=>{
    const s=div("stat");s.innerHTML=`<div class="stat-n" style="color:${col}">${n}</div><div class="stat-l">${l}</div>`;sr.appendChild(s);});

        const chars=item.idx===null?flatten(S.gIdx,S.vIdx,null):flatten(S.gIdx,S.vIdx,item.idx);
        const pct=Math.round(chars.filter(c=>S.srs[c.c]&&S.srs[c.c].reps>0).length/Math.max(1,chars.length)*100);
        const sel=S.uIdx===item.idx;
        const row=div("unit-row"+(sel?" sel":""));
        row.onclick=()=>{S.uIdx=item.idx;render();};
        const inf=div("unit-info");inf.innerHTML=`<div class="unit-name">${item.u||item.u}</div><div class="unit-meta">${chars.length}字</div>`;
        const bw=div("bar-w");const bf=div("bar-f");bf.style.width=pct+"%";bf.style.background=pct===100?"var(--s)":pct>50?"var(--a)":"var(--w)";bw.appendChild(bf);
        const pe=div("pct-t");pe.textContent=pct+"%";
        row.appendChild(inf);row.appendChild(pe);row.appendChild(bw);
        if(sel){const ck=div("");ck.style.cssText="font-size:13px;color:var(--a);margin-left:4px";ck.textContent="✓";row.appendChild(ck);}

  /* 开始按钮 */

  wrap.appendChild(sb);

    const cc=div("card");cc.style.padding="1rem";
    const cl=div("");cl.style.cssText="font-size:11px;color:var(--t2);margin-bottom:10px";cl.textContent="在田字格中书写（手指或触控笔均可）：";
    cc.appendChild(cl);cc.appendChild(makeCanvas());wrap.appendChild(cc);
    const cb=mk("button","btn btn-p","写完了，对比答案 →");
    cb.onclick=()=>{if(!S.hasStrokes){alert("请先写字！");return;}S.capturedImg=snap();S.phase="compare";render();};
    wrap.appendChild(cb);
  }
  else if(S.phase==="compare"){
    const tip=div("");tip.style.cssText="font-size:13px;color:var(--t2);text-align:center;margin-bottom:8px";tip.textContent="对比你写的和标准字，自己判断";wrap.appendChild(tip);
    const row=div("compare-row");
    const left=div("cbox");left.innerHTML="<div style=\"font-size:11px;color:var(--t2);margin-bottom:6px\">你写的</div>";
    if(S.capturedImg){const img=new Image();img.src=S.capturedImg;img.style.cssText="width:100%;max-width:130px;border-radius:6px;border:0.5px solid var(--bd);display:block;margin:0 auto;image-rendering:pixelated";left.appendChild(img);}
    else{const ph=div("");ph.style.cssText="font-size:13px;color:var(--t2);padding:18px 0";ph.textContent="请凭记忆判断";left.appendChild(ph);}
    const right=div("cbox");right.innerHTML=`<div style="font-size:11px;color:var(--t2);margin-bottom:6px">标准字</div><div style="font-size:88px;line-height:1.1;padding:4px 0;font-family:serif;color:var(--t)">${c.c}</div><div style="font-size:12px;color:var(--t2);margin-top:3px">${c.p}</div>`;
    row.appendChild(left);row.appendChild(right);wrap.appendChild(row);
    const br=div("judge-row");
    const ok=div("jbtn");ok.style.cssText="flex:1;border-radius:12px;text-align:center;cursor:pointer;background:#E1F5EE;border:2px solid #1D9E75;padding:14px 6px;min-height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center";
    ok.onclick=()=>doGrade(3);ok.innerHTML="<div style=\"font-size:34px;color:#1D9E75\">✓</div><div style=\"font-size:14px;font-weight:500;color:#1D9E75;margin-top:3px\">写对了！</div>";
    const wr=div("jbtn");wr.style.cssText="flex:1;border-radius:12px;text-align:center;cursor:pointer;background:#FCEBEB;border:2px solid #E24B4A;padding:14px 6px;min-height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center";
    wr.onclick=()=>doGrade(1);wr.innerHTML="<div style=\"display:flex;justify-content:center\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E24B4A\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 19.5A2.5 2.5 0 0 1 6.5 17H20\"/><path d=\"M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z\"/><line x1=\"9\" y1=\"7\" x2=\"15\" y2=\"7\"/><line x1=\"9\" y1=\"11\" x2=\"15\" y2=\"11\"/><line x1=\"9\" y1=\"15\" x2=\"12\" y2=\"15\"/></svg></div><div style=\"font-size:14px;font-weight:500;color:#E24B4A;margin-top:3px\">加入生词库</div>";
    br.appendChild(ok);br.appendChild(wr);wrap.appendChild(br);
    const ht=div("");ht.style.cssText="font-size:11px;color:var(--t2);text-align:center";ht.textContent="仔细比对每一笔，诚实判断哦！";wrap.appendChild(ht);
  }
  else if(S.phase==="result"){
    const good=S.grade>=3,rv=div("");rv.style.cssText="text-align:center;padding:1.25rem 1rem;margin-bottom:.75rem";
    const ic=div("rc");ic.style.cssText+=`;background:${good?"#E1F5EE":"#FCEBEB"};border:3px solid ${good?"#1D9E75":"#E24B4A"};color:${good?"#1D9E75":"#E24B4A"}`;
    if(good){ic.innerHTML="<span style=\"font-size:48px;line-height:1\">✓</span>";}
    else{ic.innerHTML="<svg width=\"44\" height=\"44\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E24B4A\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 19.5A2.5 2.5 0 0 1 6.5 17H20\"/><path d=\"M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z\"/><line x1=\"9\" y1=\"7\" x2=\"15\" y2=\"7\"/><line x1=\"9\" y1=\"11\" x2=\"15\" y2=\"11\"/><line x1=\"9\" y1=\"15\" x2=\"12\" y2=\"15\"/></svg>";}
    ic.className="rc "+(good?"pop":"shk");
    const rt=div("");rt.style.cssText=`font-size:17px;font-weight:500;color:${good?"#1D9E75":"#E24B4A"};margin-bottom:4px`;rt.textContent=good?"写对了！真棒！":"已加入生词库，多练几遍";
    rv.appendChild(ic);rv.appendChild(rt);wrap.appendChild(rv);
    const ac=div("");ac.style.cssText=`border:0.5px solid ${good?"#1D9E75":"#E24B4A"};background:${good?"#E1F5EE":"#FCEBEB"};border-radius:12px;padding:1.25rem;margin-bottom:.75rem;display:flex;align-items:center;gap:14px`;
    ac.innerHTML=`<div style="font-size:60px;line-height:1;flex-shrink:0">${c.c}</div><div style="flex:1;min-width:0"><div style="font-size:15px;color:var(--t2);margin-bottom:3px">${c.p}</div><div style="font-size:13px;color:var(--t2);margin-bottom:3px">${c.m}</div><div style="font-size:11px;color:var(--t2)">${c.grade} ${c.vol} · ${c.unit}</div></div>`;
    wrap.appendChild(ac);
    if(S.idx<S.list.length-1){
      const nb=mk("button","btn btn-p","下一个汉字 →");nb.onclick=()=>{S.idx++;S.phase="write";S.grade=null;S.hasStrokes=false;S.capturedImg=null;render();setTimeout(()=>speak(S.list[S.idx]),300);};wrap.appendChild(nb);
    }else{
      const done=div("card");done.style.cssText="text-align:center;border-color:#1D9E75;background:#E1F5EE";
      done.innerHTML=`<div style="font-size:17px;font-weight:500;color:#1D9E75;margin-bottom:6px">练习完成！</div><div style="font-size:14px;color:var(--t2);margin-bottom:12px">写对 ${S.session.ok} 个 · 加入生词库 ${S.session.fail} 个</div>`;
      const hb=mk("button","btn btn-p","返回首页");hb.style.cssText="display:inline-block;width:auto;padding:10px 28px";hb.onclick=()=>{S.screen="home";render();};done.appendChild(hb);wrap.appendChild(done);
    }
  }
  return wrap;
}

function render(){const app=document.getElementById("app");if(!app)return;app.innerHTML="";app.appendChild(S.screen==="home"?Home():Practice());}
load();
if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.addEventListener("voiceschanged",()=>window.speechSynthesis.getVoices());}
render();
</script>
</body>
</html>
